<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 紫色生活流水帳</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f8f7ff;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-header {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .day-card {
            transition: transform 0.2s;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .category-label-input {
            background: transparent;
            border: none;
            width: 100%;
            font-size: 11px;
            color: #64748b;
            font-weight: 600;
            text-align: center;
            outline: none;
        }
        .item-note-input {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 8px;
            border: 1px dashed #ddd;
            width: 100%;
            margin-bottom: 4px;
            outline: none;
            background: #fff;
        }
    </style>
</head>
<body class="min-h-screen pb-20">
    <!-- 頂部統計欄 (保留您喜歡的大標題樣式) -->
    <header class="glass-header text-white shadow-xl p-5 mb-6">
        <div class="max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex flex-col items-start">
                <h1 class="text-2xl font-bold leading-tight">💜 2026 錢包流水帳 Web App</h1>
                <div class="flex items-center gap-2 mt-1">
                    <p id="syncStatus" class="text-purple-100 text-sm opacity-90 font-medium">資料已就緒</p>
                    <span id="statusDot" class="inline-block w-2 h-2 rounded-full bg-green-400"></span>
                </div>
            </div>
            <div class="flex gap-8 text-center items-center">
                <div class="flex flex-col items-end">
                    <span class="text-[10px] opacity-80 uppercase tracking-wider">今日支出</span>
                    <span class="text-2xl font-black" id="totalExpenseToday">$ 0</span>
                </div>
                <div class="border-l border-purple-400 h-8"></div>
                <div class="flex flex-col items-end">
                    <span class="text-[10px] opacity-80 uppercase tracking-wider">錢包餘額</span>
                    <span class="text-2xl font-black text-yellow-300" id="finalWalletBalance">$ 0</span>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4">
        <div id="expenseList" class="space-y-6">
            <!-- JS 動態生成內容 -->
        </div>
    </main>

    <script>
        // 設定與資料初始
        const START_DATE = new Date('2026-03-26');
        const END_DATE = new Date('2026-12-31');
        const STORAGE_KEY = 'expense_app_v2_local';
        const LABELS_KEY = 'expense_labels_v2_local';

        const defaultCategories = [
            { key: 'breakfast', label: '早餐', icon: '🥐', editable: false, hasNote: false },
            { key: 'lunch', label: '午餐', icon: '🍱', editable: false, hasNote: false },
            { key: 'dinner', label: '晚餐', icon: '🥘', editable: false, hasNote: false },
            { key: 'drink', label: '飲料', icon: '🧋', editable: false, hasNote: false },
            { key: 'smoke', label: '煙', icon: '🚬', editable: false, hasNote: false },
            { key: 'others', label: '自訂1', icon: '🎀', editable: true, hasNote: true },
            { key: 'others2', label: '自訂2', icon: '🌸', editable: true, hasNote: true },
            { key: 'others3', label: '自訂3', icon: '🌷', editable: true, hasNote: true },
            { key: 'card1', label: '刷卡A', icon: '💳', editable: true, hasNote: true },
            { key: 'card2', label: '刷卡B', icon: '💳', editable: true, hasNote: true }
        ];

        let allData = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        let customLabels = JSON.parse(localStorage.getItem(LABELS_KEY) || '{}');

        function init() {
            let html = '';
            let current = new Date(START_DATE);

            while (current <= END_DATE) {
                const dateStr = current.toISOString().split('T')[0];
                const dayOfWeek = ['日', '一', '二', '三', '四', '五', '六'][current.getDay()];
                const isWeekend = current.getDay() === 0 || current.getDay() === 6;
                const monthName = (current.getMonth() + 1) + '月';

                if (current.getDate() === 1 || dateStr === '2026-03-26') {
                    html += `
                        <div class="pt-10 pb-4">
                            <h2 class="text-3xl font-black text-purple-900 flex items-center gap-3">
                                <span class="bg-purple-600 text-white px-3 py-1 rounded-2xl text-xl">2026</span>
                                ${monthName}
                            </h2>
                            <div class="h-1 w-20 bg-purple-400 mt-2 rounded-full"></div>
                        </div>
                    `;
                }

                const dayData = allData[dateStr] || {};
                
                html += `
                    <div class="day-card bg-white rounded-[2rem] p-6 shadow-sm border border-purple-100">
                        <div class="flex flex-col xl:flex-row gap-6">
                            <div class="min-w-[120px] ${isWeekend ? 'text-red-500' : 'text-purple-600'}">
                                <div class="text-xl font-bold">${dateStr}</div>
                                <div class="text-sm opacity-75 italic font-medium">星期${dayOfWeek}</div>
                            </div>
                            
                            <div class="w-full xl:w-96 grid grid-cols-2 gap-3 p-4 bg-purple-50 rounded-2xl border border-purple-100">
                                <div class="col-span-2 text-[11px] font-bold text-purple-400 uppercase tracking-wider mb-1">錢包預算管理</div>
                                <div class="relative">
                                    <label class="text-[10px] text-blue-900 mb-1 block pl-1 font-bold">總錢包餘額</label>
                                    <input type="number" oninput="updateData('${dateStr}','base',this.value)" value="${dayData.base || ''}" placeholder="0"
                                           class="w-full px-3 py-2 bg-white rounded-xl text-sm border border-purple-200 outline-none font-bold text-purple-800">
                                </div>
                                <div class="relative">
                                    <label class="text-[10px] text-blue-400 mb-1 block pl-1 font-bold">今日領多少用</label>
                                    <input type="number" oninput="updateData('${dateStr}','draw',this.value)" value="${dayData.draw || ''}" placeholder="0"
                                           class="w-full px-3 py-2 bg-blue-50/50 rounded-xl text-sm border border-blue-200 outline-none font-bold text-blue-700">
                                </div>
                                <div class="col-span-2 mt-1 px-1 flex justify-between items-center text-xs">
                                    <span class="text-gray-400 font-medium">拿取後錢包剩餘:</span>
                                    <span class="font-bold text-purple-600" id="remain-${dateStr}">$ 0</span>
                                </div>
                            </div>

                            <div class="flex-1">
                                <div class="text-[11px] font-black text-purple-700 uppercase tracking-wider mb-3 px-1">消費項目明細</div>
                                <div class="grid grid-cols-2 sm:grid-cols-5 gap-3 w-full">
                                    ${defaultCategories.map(cat => {
                                        const label = customLabels[cat.key] || cat.label;
                                        const note = dayData[`${cat.key}_n`] || '';
                                        return `
                                        <div class="flex flex-col">
                                            <input type="text" value="${label}" ${!cat.editable ? 'readonly' : ''} 
                                                   onblur="updateLabel('${cat.key}', this.value)"
                                                   class="category-label-input ${cat.editable ? 'hover:bg-purple-100 rounded' : ''}">
                                            ${cat.hasNote ? `<input type="text" oninput="updateData('${dateStr}','${cat.key}_n',this.value)" value="${note}" placeholder="..." class="item-note-input">` : ''}
                                            <div class="relative">
                                                <span class="absolute left-2 top-1/2 -translate-y-1/2 text-xs">${cat.icon}</span>
                                                <input type="number" oninput="updateData('${dateStr}','${cat.key}',this.value)" value="${dayData[cat.key] || ''}" 
                                                       class="w-full pl-7 pr-2 py-2 bg-gray-50 rounded-xl text-sm border border-transparent focus:border-purple-300 focus:bg-white outline-none">
                                            </div>
                                        </div>
                                        `;
                                    }).join('')}
                                </div>
                            </div>

                            <div class="w-full xl:w-32 flex justify-between xl:flex-col xl:justify-center gap-2 border-t xl:border-t-0 xl:border-l border-gray-100 pt-4 xl:pt-0 xl:pl-6">
                                <div class="xl:text-right">
                                    <span class="text-[10px] text-gray-400 block font-bold uppercase">今日花費</span>
                                    <span class="font-black text-purple-700 text-xl" id="exp-${dateStr}">$ 0</span>
                                </div>
                                <div class="xl:text-right">
                                    <span class="text-[10px] text-gray-400 block font-bold uppercase">口袋剩餘</span>
                                    <span class="font-bold text-sm" id="pocket-${dateStr}">$ 0</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                current.setDate(current.getDate() + 1);
            }
            document.getElementById('expenseList').innerHTML = html;
            calculate();
        }

        function updateData(date, type, val) {
            if(!allData[date]) allData[date] = {};
            allData[date][type] = val;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(allData));
            calculate();
        }

        function updateLabel(key, val) {
            customLabels[key] = val;
            localStorage.setItem(LABELS_KEY, JSON.stringify(customLabels));
        }

        function calculate() {
            let runningWallet = 0;
            let current = new Date(START_DATE);
            while (current <= END_DATE) {
                const ds = current.toISOString().split('T')[0];
                const dD = allData[ds] || {};
                let b = (dD.base !== undefined && dD.base !== '') ? Number(dD.base) : runningWallet;
                let dr = Number(dD.draw) || 0;
                let rem = b - dr;
                let dayEx = 0;
                defaultCategories.forEach(c => dayEx += (Number(dD[c.key]) || 0));
                let pkt = dr - dayEx;
                runningWallet = rem + pkt;

                if(document.getElementById(`remain-${ds}`)) document.getElementById(`remain-${ds}`).innerText = `$ ${rem.toLocaleString()}`;
                if(document.getElementById(`exp-${ds}`)) document.getElementById(`exp-${ds}`).innerText = `$ ${dayEx.toLocaleString()}`;
                if(document.getElementById(`pocket-${ds}`)) {
                    const pEl = document.getElementById(`pocket-${ds}`);
                    pEl.innerText = `$ ${pkt.toLocaleString()}`;
                    pEl.className = pkt < 0 ? 'font-bold text-red-500 text-sm' : 'font-bold text-green-600 text-sm';
                }
                current.setDate(current.getDate() + 1);
            }
            document.getElementById('finalWalletBalance').innerText = `$ ${runningWallet.toLocaleString()}`;
            const today = new Date().toISOString().split('T')[0];
            let tSum = 0;
            if(allData[today]) defaultCategories.forEach(c => tSum += (Number(allData[today][c.key]) || 0));
            document.getElementById('totalExpenseToday').innerText = `$ ${tSum.toLocaleString()}`;
        }

        init();
    </script>
</body>
</html>
